<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3학년 진학지도 통합 조회</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#0d2a5e">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d2a5e;
      font-family: "맑은 고딕", "Malgun Gothic", sans-serif;
      color: #fff;
      text-align: center;
    }
    .box {
      width: 90%;
      max-width: 420px;
    }
    img {
      width: 112px;
      height: 112px;
      border-radius: 26px;
      margin-bottom: 18px;
    }
    h1 {
      font-size: 23px;
      line-height: 1.32;
      margin: 0 0 14px;
      font-weight: 900;
    }
    p {
      font-size: 14px;
      line-height: 1.45;
      opacity: 0.9;
      margin: 0 0 22px;
      font-weight: 700;
    }
    a {
      display: block;
      background: #fff;
      color: #0d2a5e;
      text-decoration: none;
      font-size: 19px;
      font-weight: 900;
      padding: 15px 18px;
      border-radius: 16px;
    }
  </style>

  <script>
    /* 새 배포 후 아래 주소만 새 Apps Script 배포 주소로 바꾸세요. */
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzLJhTBEn345MvQ573uQMqDZt-op_GrC9F7Z1AbyIq1pDMQq-zN2DUK2SbNJWQmCKQ-iA/exec";

    function openWebApp_() {
      if (!WEBAPP_URL || WEBAPP_URL.indexOf("여기에_") === 0) return;
      location.replace(WEBAPP_URL);
    }

    if (new URLSearchParams(location.search).get("home") === "1") {
      openWebApp_();
    }
  </script>
</head>
<body>
  <div class="box">
    <img src="icon-192.png" alt="3학년 진학지도 통합 조회 아이콘">
    <h1>3학년 진학지도<br>통합 조회</h1>
    <p>홈 화면에 추가하면 이 아이콘으로 진학지도 웹앱을 열 수 있습니다.</p>
    <a href="https://script.google.com/macros/s/AKfycbzLJhTBEn345MvQ573uQMqDZt-op_GrC9F7Z1AbyIq1pDMQq-zN2DUK2SbNJWQmCKQ-iA/exec">웹앱 바로 열기</a>
  </div>
</body>
</html>
