<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>자기주도학습 통합관리 시스템</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./poster_192.png" />
  <link rel="apple-touch-icon" href="./poster_192.png" />

  <meta name="theme-color" content="#050611" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="자기주도학습" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #050611;
      overflow: hidden;
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(255, 202, 104, 0.18), transparent 32%),
        linear-gradient(180deg, #10172b 0%, #050611 100%);
      color: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    #appFrame {
      width: 100%;
      height: 100vh;
      border: 0;
      display: block;
      background: #ffffff;
    }
  </style>
</head>

<body>
  <div id="loading">자기주도학습 시스템을 여는 중입니다...</div>

  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbyKkkaj1DC1OKLX4Kad85ZmBpWk6LvkTkMZTuB0jk2clzaMFSGRXLw-_R-eIBkrZsmw/exec"
    allow="fullscreen"
  ></iframe>

  <script>
    const frame = document.getElementById('appFrame');
    const loading = document.getElementById('loading');

    frame.addEventListener('load', function () {
      loading.style.display = 'none';
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
